name: Release

# Tag-driven release pipeline (hatch-vcs): `git tag vX.Y.Z && git push origin vX.Y.Z`.
# Everything below is gated on the tag and runs strictly in order:
#
#   ci  ->  docker  ->  github-release  ->  (pypi.yml, on release published)
#
#   1. ci             reuse CI (lint, type-check, test) as the release gate
#   2. docker         build & push the CPU/GPU images to GHCR (needs: ci)
#   3. github-release build the sdist/wheel and cut the Release, with notes
#                     referencing the images just pushed (needs: docker)
#
# Publishing to PyPI is a separate workflow (pypi.yml) that this job dispatches
# explicitly via `gh workflow run` once the Release is cut — so it runs after
# the Release and a PyPI misconfiguration never blocks the GitHub Release.
# (We can't rely on the `release: published` event: GitHub suppresses events
# emitted by GITHUB_TOKEN to prevent recursion; workflow_dispatch is the
# documented exception.) Keeping it separate also keeps PyPI Trusted Publishing
# pinned to pypi.yml as its own top-level workflow / OIDC subject.

on:
  push:
    tags:
      - "v*.*.*"

# Default for jobs that don't override it. The docker / github-release jobs set
# their own (packages: write / contents: write) below.
permissions:
  contents: read

jobs:
  ci:
    name: ci gate
    uses: ./.github/workflows/ci.yml

  docker:
    name: docker images
    needs: ci
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker.yml

  github-release:
    name: build & github release
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write # dispatch pypi.yml at the end of this job
    steps:
      - uses: actions/checkout@v7
        with:
          # hatch-vcs needs the full history + tags to derive the version.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.12"
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

      # Container images published by the `docker` job above, surfaced in the
      # release notes so each Release links the wheel and its images together.
      - name: Compose image reference notes
        id: images
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/coro
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          {
            echo 'body<<EOF'
            echo '## Container images'
            echo
            echo 'Published to GHCR by this release:'
            echo
            echo '| Flavour | Tags |'
            echo '| --- | --- |'
            echo "| GPU (default) | \`${IMAGE}:${version}\`, \`${IMAGE}:latest\`, \`${IMAGE}:${version}-gpu\`, \`${IMAGE}:latest-gpu\` |"
            echo "| CPU | \`${IMAGE}:${version}-cpu\`, \`${IMAGE}:latest-cpu\` |"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          append_body: true
          body: ${{ steps.images.outputs.body }}
          files: dist/*

      # The Release above is created with GITHUB_TOKEN, and GitHub deliberately
      # does NOT let a GITHUB_TOKEN-emitted `release: published` event trigger
      # other workflows (anti-recursion). workflow_dispatch / repository_dispatch
      # are the documented exceptions, so we dispatch pypi.yml explicitly here.
      # This keeps PyPI Trusted Publishing pinned to pypi.yml as its own
      # top-level run (its own OIDC subject), while still being fully automatic.
      - name: Dispatch PyPI publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pypi.yml -f ref="${{ github.ref_name }}"
