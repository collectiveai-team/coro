name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Reused by the Release pipeline (release.yml) as the gate before the Docker
  # build, so a tagged release runs the exact same lint/type-check/test job.
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint, type-check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.12"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # CPU extra: cuda wheels require a GPU runner. dev group installs by
      # default; bench group is needed for the tests/test_bench_* suite (meeteval).
      - name: Install dependencies
        run: uv sync --frozen --extra cpu --group bench

      # prek runs the same hooks (ruff-format, ruff, pyrefly, hygiene) as locally.
      - name: Lint, format & type check (prek)
        run: uvx prek run --all-files --show-diff-on-failure

      - name: Run tests
        run: uv run pytest
