name: Docker

# Builds CPU and GPU runtime images for a release and pushes them to GHCR.
#   tag vX.Y.Z -> :X.Y.Z-<flavour> and :latest-<flavour>
# The GPU build additionally publishes the unsuffixed aliases :latest and
# :X.Y.Z, so the bare image:version / image:latest point at the GPU image.
# GPU images only need a GPU to *run*, not to build, so they build on the
# standard hosted runner (a free-disk-space step makes room for the CUDA layers).
#
# This workflow is release-only: it is driven by the Release pipeline
# (release.yml), which calls it via workflow_call *after* CI passes and
# *before* the GitHub Release is cut, so the images exist by the time the
# release notes reference them. workflow_dispatch allows a manual re-run from a
# tag. There is no continuous (per-main-push) image build.

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/coro

jobs:
  build:
    name: ${{ matrix.flavour }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavour: cpu
            extra: cpu
            core_image: ubuntu:noble
          - flavour: gpu
            extra: cuda
            core_image: nvidia/cuda:12.6.2-cudnn-runtime-ubuntu24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # hatch-vcs needs tags to resolve the version

      # CUDA base + torch-cuda + nemo layers are multi-GB; reclaim runner disk.
      - name: Free disk space
        if: matrix.flavour == 'gpu'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          large-packages: false

      # hatch-vcs is the source of truth for the version and always emits a
      # PEP 440 string (e.g. 1.0.2, or 1.0.2.dev3+g<sha> off-tag). The previous
      # `git describe | sed` produced `1.0.1-7-g<sha>` off-tag, which is not
      # PEP 440 and broke the in-container wheel build via HATCH_VCS_PRETEND_VERSION.
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.12"
          enable-cache: true

      - name: Resolve version (PEP 440 via hatch-vcs)
        id: ver
        run: echo "value=$(uvx hatch version)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
            suffix=-${{ matrix.flavour }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
            # Unsuffixed aliases (image:version / image:latest) -> the GPU image.
            type=semver,pattern={{version}},suffix=,enable=${{ matrix.flavour == 'gpu' }}
            type=raw,value=latest,suffix=,enable=${{ matrix.flavour == 'gpu' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CORE_IMAGE=${{ matrix.core_image }}
            EXTRA=${{ matrix.extra }}
            CORO_VERSION=${{ steps.ver.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.flavour }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavour }}
