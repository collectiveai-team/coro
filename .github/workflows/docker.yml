name: Docker

# Builds CPU and GPU runtime images and pushes them to GHCR.
#   - push to main  -> :latest-<flavour> and :sha-<short>-<flavour>
#   - tag vX.Y.Z    -> :X.Y.Z-<flavour> and :latest-<flavour>
# The GPU build additionally publishes the unsuffixed aliases :latest and
# :X.Y.Z, so the bare image:version / image:latest point at the GPU image.
# GPU images only need a GPU to *run*, not to build, so they build on the
# standard hosted runner (a free-disk-space step makes room for the CUDA layers).

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/coro

jobs:
  build:
    name: ${{ matrix.flavour }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavour: cpu
            extra: cpu
            core_image: ubuntu:noble
          - flavour: gpu
            extra: cuda
            core_image: nvidia/cuda:12.6.2-cudnn-runtime-ubuntu24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hatch-vcs needs tags to resolve the version

      # CUDA base + torch-cuda + nemo layers are multi-GB; reclaim runner disk.
      - name: Free disk space
        if: matrix.flavour == 'gpu'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          large-packages: false

      - name: Resolve version
        id: ver
        run: echo "value=$(git describe --tags --always | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
            suffix=-${{ matrix.flavour }},onlatest=true
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            # Unsuffixed aliases (image:version / image:latest) -> the GPU image.
            type=semver,pattern={{version}},suffix=,enable=${{ matrix.flavour == 'gpu' }}
            type=raw,value=latest,suffix=,enable=${{ matrix.flavour == 'gpu' && github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CORE_IMAGE=${{ matrix.core_image }}
            EXTRA=${{ matrix.extra }}
            CORO_VERSION=${{ steps.ver.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.flavour }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavour }}
