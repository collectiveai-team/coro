name: Publish to PyPI

# Last stage of the tag-driven release pipeline. Fires on the `release:
# published` event emitted by release.yml's github-release job, i.e. after
# ci -> docker -> github-release have all succeeded. Releases are only ever cut
# from a vX.Y.Z tag, so this is effectively tag-only. Kept as its own workflow
# so a PyPI misconfiguration fails in isolation without affecting the Release,
# and so Trusted Publishing stays pinned to pypi.yml as the top-level workflow.
# Re-run manually via the Actions tab (workflow_dispatch) if needed.
#
# Setup required (one-time, on PyPI):
#   pypi.org -> project `coro-asr` -> Publishing -> Add a Trusted Publisher:
#     Owner: collectiveai-team   Repository: coro
#     Workflow: pypi.yml         Environment: pypi
# No API token/secret is needed once Trusted Publishing is set up.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build and publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: read

jobs:
  pypi:
    name: build & publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/coro-asr
    permissions:
      id-token: write # OIDC for Trusted Publishing
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0 # hatch-vcs needs tags/history

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.12"
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
